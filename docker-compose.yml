services:
    postgres:
        image: postgres:16-alpine
        container_name: payments-postgres
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: payment_system
        ports:
            - '5432:5432'
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d payment_system']
            interval: 3s
            timeout: 3s
            retries: 10

    redis:
        image: redis:7-alpine
        container_name: payments-redis
        ports:
            - '6379:6379'
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 3s
            timeout: 3s
            retries: 10

volumes:
    pgdata:
